services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sofake-network

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=sqlite:///./news.db
      - AGENT_URL=http://agent:8001
      - FUSE_URL=http://fuse:8002
    ports:
      - "9000:8000"
    volumes:
      - ./backend/news.db:/app/news.db
    networks:
      - sofake-network

  agent:
    build: ./agent
    container_name: sofake-agent
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    ports:
      - "9001:8001"
    volumes:
      - ./agent/runs:/app/runs 
    networks:
      - sofake-network

  fuse:
    build: ./FUSE
    container_name: sofake-fuse
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "9002:8002"
    networks:
      - sofake-network

  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    profiles:
      - test
    volumes:
      - .:/app
    working_dir: /app
    command: ["pytest", "tests/", "-v", "--tb=short"]

networks:
  sofake-network:
    driver: bridge
