services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sofake-network

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=sqlite:///./news.db
      - AGENT_URL=http://agent:8001  # йў„з•™ agent 
      - FUSE_URL=http://fuse:8002   # йў„з•™ fuse 
    ports:
      - "8000:8000"
    volumes:
      - ./backend/news.db:/app/news.db
    networks:
      - sofake-network

  # Agent жЁЎеќ—жЎ†жћ¶
  agent:
    image: python:3.12-slim
    container_name: sofake-agent
    command: ["sh", "-c", "echo 'Agent module placeholder' && sleep infinity"]
    networks:
      - sofake-network

  # Fuse жЁЎеќ—жЎ†жћ¶
  fuse:
    image: python:3.12-slim
    container_name: sofake-fuse
    command: ["sh", "-c", "echo 'Fuse module placeholder' && sleep infinity"]
    networks:
      - sofake-network

networks:
  sofake-network:
    driver: bridge