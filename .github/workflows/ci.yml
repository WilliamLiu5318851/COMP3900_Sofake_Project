name: SoFake CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          # Uncomment the following lines if your linting requires project dependencies
          # pip install -r agent/requirements.txt
          # pip install -r backend/requirements.txt

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 agent/ backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings. The GitHub editor is 127 chars wide
          flake8 agent/ backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint